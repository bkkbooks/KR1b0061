body:
  text: 古文尚書音尚書序八卦之說謂之八索音素陸德明釋文蘇故切求也丁度集韻云聲十一暮索字注堯典曰放勳放鄭王如字釋文光被四表被扶義反寅賓出日寅以真反又音夷下同賓音殯鳥獸氄毛如勇反又而充反帝曰吁往付反一音于共工方鳩僝功僝音撰方命鄭王音放异哉异鄭音異孔王音怡已也並同上舜典輯五瑞輯音集釋文乃日覲四嶽群牧音目同上東巡守巡養純反釋文俞綸切行也集韻俞倫切司馬光類篇卷二十有一月有于救反釋文撲作教刑撲敷卜反金作贖刑贖音樹闢四門闢甫亦反垂哉垂音腄夙夜惟寅音夷歌永言水者詠又如字豫擊石拊石拊音府朕暨讒說殄行堲在力反說失鋭反別生分類作汨作分扶問反並同上大禹謨本虞書總為一卷釋文嘉言罔攸伏攸以帚反同上嘉乃丕續丕甫眉反釋文無稽之勿聽天定反釋文惟口出好出尺遂反好許到反惟先蔽志蔽甫世反正月朔旦正音征舞于羽于兩階音皆並同上皋陶謨擾而毅擾音饒釋文日嚴祗敬六德嚴魚檢反釋文兢兢業業五答反釋文一日二日萬幾音機天明畏音威豫未有知音智思曰贊贊襄哉思音息吏反並同上益稷豫思日孜孜思如字又息吏反釋文豫乘四載傳山乘樏音丘遙反暨益奏庶鮮食鮮音仙並同上粉䋛音米釋文絺繡絺勑私反又勑其反釋文否則威之否音鄙傲虐是作傲五報反並同上外薄四海薄扶各反蒲各反毛居正六經正誤卷二戛擊鳴球戛古八反釋文合止柷敔合音閣元首叢脞哉脞音瑣並同上禹貢灉沮會同灉音雍釋文海濱廣斥音尺同上岱甽谷絲枲釋文萊夷作牧音目一音茂注同釋文厥土赤埴墳埴鄭王皆讀曰熾淮夷蠙珠蚓扶堅反厥匪玄纖縞古到反厥木惟喬音驕島夷卉服卉許貴反並同上云土夢作乂夢莫公反釋文杶幹栝柏杶勑荀反木名又作椿礪砥弩丹砥之履反包匭菁茅菁音精導菏澤被孟豬菏音柯又士可反注同被扶義反注同岷嶓既藝嶓甫河反厥土青黎力私反厥貢璆鐵璆音虯又居虯反又閭幼反至于大伾扶眉反又敷眉反東匯澤為彭蠡匯胡罪反祗台德先台音怡並同上甘誓怠棄三正釋文五子之歌有窮后羿胡細反釋文顏厚有忸怩乃私反胤征羲和湎淫湎音緬面善反釋文湯始居亳扶各反作帝告釐沃烏酷反並同上湯誓率割夏邑割音謁釋文豫其大賚汝賚音來仲虺之誥湯歸自夏至于大坰欽螢反又古螢反釋文若粟之有秕甫里反又必履反垂裕後昆裕以樹反能自得師者王于況反又如字並同上湯誥賁若草木賁扶云反飾也釋文俾豫一人俾甫婢反使也無從匪彝音夷並同上伊訓朕哉自亳扶各反釋文敢有殉于貨色殉辭荀反比頑童比扶至反聖謨洋洋音翔並同上太甲上克左右厥辟甫亦反釋文肆嗣王丕承基丕甫眉反釋文緒餘殘也集韻下平聲九麻餘字注太甲中欲敗度縱敗禮敗甫邁反釋文既往背師保之訓背扶代反咸有一德天難諶市林反為上為德為音于僞反不獲自盡于忍注同沃丁既葬沃於毒反祖乙圮于耿圮扶美反盤庚五遷將治亳殷民咨胥怨胥思餘反並同上盤庚上有條而不紊音文釋文無文切亂也集韻上平聲二十文紊字注相時憸民相息羊反憸七漸反遲任有言曰遲持夷反邦之不臧子郎反度乃口度如字亦音渡盤庚中誕告用亶誕音但比于罰比扶志反注及下同臭厥載臭尸售反恐人倚乃身倚於奇反並同上豫御續乃命于天御音訝顏師古匡謬正俗卷二我乃劓殄滅之劓吾氣反釋文魚既切割也集韻去聲八未劓字注盤庚下今豫其敷心腹賢腸持良反釋文用降我凶德降下江反釋文說命上夢帝賚豫良弼賚音來釋文用汝作舟楫音集若藥弗瞑眩呼縣反瞑眩困極也並同上若跣弗視地跣顯反釋文此演切足親地也集韻上聲二十八獮跣字注說命下咸仰朕德仰五亮反釋文微子我用沈酗于酒沈直金反釋文今殷其淪喪淪力允反釋文縷尹切沒也集韻上聲十七隼淪字注吾家耄遜于荒孔傳故欲遁出於荒野遁徒頓反一音徒困反釋文用乂讎斂讎鄭音疇馬本作稠云數也斂鄭力劍反同上我不顧行遁顧音鼓釋文果五切視也集韻上聲十姥顧字注泰誓上刳剔孕婦孕養證反正義泰誓下毒痡四海痡音敷又普吳反同上牧誓牧一音茂王左杖黃鉞杖直亮反及庸蜀羌髳羌起良反比爾干比扶志毗志二反牝雞無晨牝頻引反乂扶忍反俾暴虐于百姓俾甫婢反下同並同上弗御克奔御五所切匡謬正俗卷二武成武王伐殷往伐歸獸始售反本或作嘼始救反釋文匡謬正俗卷二哉生明哉音載釋文陳于商郊陳音塵血流溧杵漂敷妙反又匹消反大賚于四海賚音來並同上洪範不畀洪範九疇畀甫至反注同與也釋文彝倫攸斁同路反敗也三曰視市止反五曰思息吏反下同明作哲之列反又之世反而畏高明畏鄭音威使羞其行下孟反惟辟作福辟補亦反並同上曰蒙亡鉤反釋文六經正誤卷二庶草蕃廡莫柱反釋文曰哲音制又音哲曰豫羊庶反又音舒巢伯來朝芮伯作旅巢命巢以交反並同上金縢植壁秉圭植音置釋文是有丕子之責于天丕甫眉反啓籥以略反名之曰鴖梟名亡政反王與大夫盡辨扶變反代武王之說如鋭反並同上大誥敷賁音憤釋文天明畏音威天棐諶辭棐音匪又芳鬼反並同上康誥聞于上帝聞如字又音問釋文紹聞衣德言衣於既反往盡乃心盡豫忍反應保殷民應於甑反罔弗憝徒猥反大泯亂泯武軫反告汝德之說始鋭反酒誥矧惟若疇圻父薄違農夫薄扶各反違音回梓材肆亦見厥君事見賢遍反戕敗人宥戕在羊反又七良反惟其塗塈茨塈許既反茨在私反惟其塗丹雘烏郭反並同上召誥惟丙午朏芳尾反又芳憒反釋文用顧畏于民碞五咸反又音吟比介我有周御事比扶志反用供王能祈天永命供紀用反注供待同並同上洛誥伻來伻敷耕反又甫耕反下同釋文伻嚮許亮反注同頒朕不暇頒甫云反汝乃是不蘉莫剛反又武剛反萬年厭于乃德厭於廉反並同上多士敢弋殷命弋音翼釋文罔攸賓音殯同上爾不翅不有爾土翅始豉反釋文君奭遏佚前人光遏音渴絶反釋文亦惟有若虢叔虢公伯反有若閎夭於驕反文王蔑德蔑亡結反並同上蔡仲之命乃致辟管叔于商辟扶亦反釋文汝即乃封甫用反釋文芳用切爵土也集韻去聲三用封字注成王既踐奄將遷其君于蒲姑蒲如字又扶各反釋文立政綴衣綴之衛反又之劣反釋文迪知忱恂于九德之行下孟反陟丕釐上帝之耿命耿工頴反又工永反下同其在受德暋亡巾反一音閔乃伻我有夏伻敷耕反又甫耕反用憸人憸七漸反本又作憸同憸利之人並同上周官還歸在豐還音全釋文擾兆民擾音饒同上顧命王乃洮頮水洮音逃釋文相被玉几被扶僞反注同惟幾音畿下同則肄以至反又以制反在後之侗音同又勑動反用敬保元子釗之肴反出綴衣于庭出尺遂反狄設黼扆黼音補西夾音頰注同敷重筍竹子竹為席于貧反漆仍几漆七利反一人雀辨扶變反夾西階戺夾工洽反戺音士一人冕執瞿音懼由賓階隮子詣反釋文率循大卞扶變反並同上三咤陟嫁反又音託又豬夜反釋文闥各切奠爵也集韻入聲十九鐸咤字注宅授宗人同拜宅殆故反太保降收注盡收徹直列反康王之誥付畀四方畀甫至反並同上畢命庚午朏芳尾反又芳憒反釋文豫小子垂拱仰成仰五亮反慎固封守始救反並同上冏命側媚注諂諛之人諛以朱反釋文爾無昵于憸人憸七漸反利口也本亦作憸同上呂刑爰始淫為劓刵椓黥刵如志反釋文泯泯棼棼以覆詛盟泯音民棼扶云反覆敷目反其罰百鍰戶關反六兩也同上費誓杜乃擭戶覆戶釋文胡谷切捕獸機檻也集韻入聲一屋擭字注敜乃阱敜乃協反又乃結反釋文我商賚汝商音章釋文諸良切度也集韻下平聲十陽商字注賚音來釋文峙乃楨幹楨音貞釋文秦誓仡仡勇夫仡仡馬本作訖訖強狀惟截截善諞言諞敷連反又甫淺反釋文邦之杌隉語結反同上
